services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: kimo-labs-backend-dev
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CHROMA_PORT=8000
      - CACHE_HOST=valkey
      - CACHE_PORT=6379
    ports:
      - "8001:8000"
    volumes:
      - ./apps/backend:/app
      - ./data/docs:/app/docs
      - ./data/db:/app/db
      - ./hf_cache:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - chroma-server
      - valkey

  chroma-server:
    image: chromadb/chroma:latest
    container_name: kimo-labs-chroma-dev
    ports:
      - "8002:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - IS_PERSISTENT=TRUE

  frontend:
    image: node:20-alpine
    container_name: kimo-labs-frontend-dev
    working_dir: /app
    ports:
      - "3001:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules # Preserve node_modules inside container
    environment:
      - NEXT_PUBLIC_API_URL=http://10.10.20.144:8001
    command: npm run dev
    depends_on:
      - backend

  chroma-admin:
    image: fengzhichao/chromadb-admin:latest
    container_name: kimo-labs-chroma-admin-dev
    environment:
      - CHROMA_URL=http://chroma-server:8000
    ports:
      - "8003:3001"
    depends_on:
      - chroma-server
    
  valkey:
    image: valkey/valkey:latest
    container_name: kimo-labs-cache-dev
    command: valkey-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 512M
