services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: kimo-labs-backend-dev
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CHROMA_HOST=chroma-server
      - CHROMA_PORT=8000
    ports:
      - "8001:8000"
    volumes:
      - ./apps/backend:/app
      - ./data/docs:/app/docs
      - ./data/db:/app/db
      - ./hf_cache:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - chroma-server

  chroma-server:
    image: chromadb/chroma:latest
    container_name: kimo-labs-chroma-dev
    ports:
      - "8002:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - IS_PERSISTENT=TRUE

  frontend:
    image: node:20-alpine
    container_name: kimo-labs-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules # Preserve node_modules inside container
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    command: npm run dev
    depends_on:
      - backend
